name: Pipeline DevOps

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y publicar imagen
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: vitukuak/devops-proyecto-final:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Login a Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Import Resource Group
        run: terraform import azurerm_resource_group.rg /subscriptions/4acd162c-9d6e-41c1-aa72-3479a25b0c3a/resourceGroups/devops-proyecto-final-rg
        working-directory: terraform
        continue-on-error: true

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform